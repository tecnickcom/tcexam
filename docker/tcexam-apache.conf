# Apache configuration for the TCExam runtime image (plan Stage 7).
# The document root is the application root (/var/www/html); the root index.php redirects to
# public/code/. AllowOverride All lets the shipped .htaccess files (install/, admin/backup/)
# take effect — they restrict access to sensitive paths.

ServerName tcexam.local
ServerTokens Prod
ServerSignature Off

<Directory /var/www/html>
    Options -Indexes +FollowSymLinks
    AllowOverride All
    Require all granted
</Directory>

# Defence in depth: never serve the application configuration or the version-control metadata.
<DirectoryMatch "/var/www/html/(shared|admin|public)/config(\.default)?">
    Require all denied
</DirectoryMatch>
<DirectoryMatch "/var/www/html/\.git">
    Require all denied
</DirectoryMatch>
